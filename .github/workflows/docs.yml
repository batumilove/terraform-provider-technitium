name: Documentation

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  docs:
    name: Verify Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: "1.26"

      - name: Generate docs
        run: make docs

      - name: Check for drift
        run: |
          if ! git diff --exit-code docs/; then
            echo "::error::Generated docs are out of sync. Run 'make docs' and commit the result."
            exit 1
          fi
