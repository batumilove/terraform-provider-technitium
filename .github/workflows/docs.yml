name: Documentation

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  docs:
    name: Verify Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26"

      # Pre-install Terraform CLI so tfplugindocs uses it from PATH instead of
      # downloading a binary at runtime. Avoids the upstream HashiCorp PGP key
      # expiry that breaks hc-install's signature verification.
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_wrapper: false

      - name: Generate docs
        run: make docs

      - name: Check for drift
        run: |
          if ! git diff --exit-code docs/; then
            echo "::error::Generated docs are out of sync. Run 'make docs' and commit the result."
            exit 1
          fi
