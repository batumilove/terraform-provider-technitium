# Overlay applied via:
#   docker compose -f docker-compose.test.yml -f docker-compose.test.tls.yml up -d --wait
#
# Adds an HTTPS port for the Technitium admin web service and mounts a
# locally-generated PKCS12 bundle into the container. The cert + key are
# regenerated by `make testacc-tls-prep` before this overlay is applied;
# they are not committed to the repository.
#
# After this overlay, the admin API is reachable at https://127.0.0.1:5443
# with the CA at ./testdata/tls/ca.pem (used by the provider via
# TECHNITIUM_CACERT).

services:
  technitium:
    ports:
      - "127.0.0.1:5443:5443"
    environment:
      DNS_SERVER_WEB_SERVICE_ENABLE_HTTPS: "true"
      DNS_SERVER_WEB_SERVICE_HTTPS_PORT: "5443"
      DNS_SERVER_WEB_SERVICE_TLS_CERTIFICATE_PATH: "/etc/dns/tls/server.pfx"
      DNS_SERVER_WEB_SERVICE_TLS_CERTIFICATE_PASSWORD: "test"
    volumes:
      - ./testdata/tls:/etc/dns/tls:ro
